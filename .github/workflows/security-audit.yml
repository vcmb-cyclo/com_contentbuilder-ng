name: PHP Security Audit

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for raw SQL queries
        run: |
          echo "Checking for raw SQL string concatenation..."
          RAW_SQL=$(grep -r "setQuery.*\. \'" --include="*.php" | grep -v "QueryBuilder\|getQuery" | wc -l)
          if [ "$RAW_SQL" -gt 0 ]; then
              echo "❌ WARNING: Found $RAW_SQL lines with potential raw SQL concatenation"
              grep -r "setQuery.*\. \'" --include="*.php" | grep -v "QueryBuilder\|getQuery" | head -10
          else
              echo "✅ PASSED: No raw SQL concatenation patterns detected"
          fi
      
      - name: Check for eval() usage
        run: |
          echo "Checking for eval() usage..."
          EVAL_COUNT=$(grep -r "eval\s*(" --include="*.php" | grep -v "doubleval\|htmlspecialchars" | wc -l)
          if [ "$EVAL_COUNT" -gt 0 ]; then
              echo "⚠️  CAUTION: Found $EVAL_COUNT eval() calls (requires security review)"
              grep -rn "eval\s*(" --include="*.php" | grep -v "doubleval\|htmlspecialchars"
          else
              echo "✅ PASSED: No dangerous eval() calls"
          fi
      
      - name: Check for translation key consistency
        run: |
          echo "Checking translation key naming conventions..."
          INVALID_KEYS=$(grep -rE "^[A-Z][A-Z0-9_]*=|^COM_[A-Z][A-Z0-9_]*=" administrator/languages/**/*.ini site/languages/**/*.ini 2>/dev/null | grep -v "^COM_CONTENTBUILDER" | wc -l)
          if [ "$INVALID_KEYS" -gt 0 ]; then
              echo "⚠️  WARNING: Found $INVALID_KEYS keys not following COM_CONTENTBUILDERNG_ prefix convention"
          else
              echo "✅ PASSED: All translation keys follow naming convention"
          fi
