name: Translation Key Audit

on:
  pull_request:
    paths:
      - 'administrator/languages/**/*.ini'
      - 'site/languages/**/*.ini'
  push:
    branches:
      - main
      - develop

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run translation audit
        run: |
          python3 scripts/l10n_duplicate_check.py --report --max 10
      
      - name: Check for duplicate translation values
        run: |
          python3 << 'SCRIPT'
          import glob
          import re
          
          # Parse all ini files
          value_to_keys = {}
          ini_files = glob.glob('administrator/languages/**/**.ini', recursive=True) + glob.glob('site/languages/**/**.ini', recursive=True)
          
          for path in ini_files:
              if path.endswith('index.html'):
                  continue
              with open(path, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith('#') or line.startswith(';') or '=' not in line:
                          continue
                      key, val = line.split('=', 1)
                      key = key.strip()
                      val = val.strip().strip('"').strip("'")
                      
                      if val not in value_to_keys:
                          value_to_keys[val] = []
                      if key not in value_to_keys[val]:
                          value_to_keys[val].append(key)
          
          # Check for duplicates
          duplicates = {v: keys for v, keys in value_to_keys.items() if len(set(keys)) > 1}
          
          if duplicates:
              print("❌ FAILED: Found duplicate translation values")
              print(f"   {len(duplicates)} duplicate values detected")
              
              # Show examples
              for value, keys in list(duplicates.items())[:5]:
                  print(f"   Value: '{value}' has keys: {', '.join(sorted(keys))}")
              
              exit(1)
          else:
              print("✅ PASSED: No duplicate translation values")
              exit(0)
          SCRIPT
